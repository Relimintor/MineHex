<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MineHex terrain</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="src/mobile/mobile.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/simplex-noise/2.4.0/simplex-noise.min.js"></script>
</head>
<body>

    <div id="mode-select">
        <div class="mode-panel">
            <h1>Select Controls</h1>
            <button data-mode="pc">PC</button>
            <button data-mode="mobile">Mobile</button>
            <button data-mode="celeron_cb">Celeron Chromebook (Ultra Low PC)</button>
            <button data-mode="console">Console</button>
            <p id="mode-status"></p>
        </div>
    </div>

    <div id="version">MineHex v0.1.1</div>
    <div id="coordinates" aria-live="polite">Axial q:0 r:0 h:0 | Cube x:0 y:0 z:0</div>

    <div id="crosshair"></div>

    <div id="inventory-screen" aria-hidden="true">
        <div class="inventory-screen-panel" role="dialog" aria-label="Inventory screen">
            <div class="inventory-avatar-box">
                <div class="inventory-avatar-gear inventory-avatar-gear-top" aria-hidden="true"></div>
                <div class="inventory-avatar-gear inventory-avatar-gear-left-top" aria-hidden="true"></div>
                <div class="inventory-avatar-gear inventory-avatar-gear-left-middle" aria-hidden="true"></div>
                <div class="inventory-avatar-gear inventory-avatar-gear-left-bottom" aria-hidden="true"></div>
                <div id="inventory-avatar-viewport" aria-label="Player avatar preview"></div>
                <div class="inventory-avatar-gear inventory-avatar-gear-right-top" aria-hidden="true"></div>
                <div class="inventory-avatar-gear inventory-avatar-gear-right-middle" aria-hidden="true"></div>
                <div class="inventory-avatar-gear inventory-avatar-gear-right-bottom" aria-hidden="true"></div>
                <div class="inventory-avatar-label">Player</div>
            </div>

            <div class="inventory-grid-box">
                <div class="inventory-top-box" aria-label="Top inventory slots">
                    <div class="inventory-square-slot" data-top-slot="1"></div>
                    <div class="inventory-square-slot" data-top-slot="2"></div>
                    <div class="inventory-square-slot" data-top-slot="3"></div>
                    <div class="inventory-square-slot" data-top-slot="4"></div>
                </div>

                <div class="inventory-honeycomb" aria-label="Inventory honeycomb with 25 extra hex slots (34 total including hotbar)">
                    <div class="inventory-row">
                        <div class="inventory-hex-slot" data-hive-slot="1"></div>
                        <div class="inventory-hex-slot" data-hive-slot="2"></div>
                        <div class="inventory-hex-slot" data-hive-slot="3"></div>
                        <div class="inventory-hex-slot" data-hive-slot="4"></div>
                        <div class="inventory-hex-slot" data-hive-slot="5"></div>
                        <div class="inventory-hex-slot" data-hive-slot="6"></div>
                        <div class="inventory-hex-slot" data-hive-slot="7"></div>
                        <div class="inventory-hex-slot" data-hive-slot="8"></div>
                    </div>
                    <div class="inventory-row">
                        <div class="inventory-hex-slot" data-hive-slot="9"></div>
                        <div class="inventory-hex-slot" data-hive-slot="10"></div>
                        <div class="inventory-hex-slot" data-hive-slot="11"></div>
                        <div class="inventory-hex-slot" data-hive-slot="12"></div>
                        <div class="inventory-hex-slot" data-hive-slot="13"></div>
                        <div class="inventory-hex-slot" data-hive-slot="14"></div>
                        <div class="inventory-hex-slot" data-hive-slot="15"></div>
                        <div class="inventory-hex-slot" data-hive-slot="16"></div>
                        <div class="inventory-hex-slot" data-hive-slot="17"></div>
                    </div>
                    <div class="inventory-row">
                        <div class="inventory-hex-slot" data-hive-slot="18"></div>
                        <div class="inventory-hex-slot" data-hive-slot="19"></div>
                        <div class="inventory-hex-slot" data-hive-slot="20"></div>
                        <div class="inventory-hex-slot" data-hive-slot="21"></div>
                        <div class="inventory-hex-slot" data-hive-slot="22"></div>
                        <div class="inventory-hex-slot" data-hive-slot="23"></div>
                        <div class="inventory-hex-slot" data-hive-slot="24"></div>
                        <div class="inventory-hex-slot" data-hive-slot="25"></div>
                    </div>
                </div>

                <div class="inventory-hotbar-strip" aria-label="Hotbar slots mirrored in inventory">
                    <div class="inventory-hex-slot is-hotbar active" data-slot="0"><div class="block-preview block-preview-grass"></div></div>
                    <div class="inventory-hex-slot is-hotbar" data-slot="1"><div class="block-preview block-preview-dirt"></div></div>
                    <div class="inventory-hex-slot is-hotbar" data-slot="2"><div class="block-preview block-preview-stone"></div></div>
                    <div class="inventory-hex-slot is-hotbar" data-slot="3"><div class="block-preview block-preview-cloud"></div></div>
                    <div class="inventory-hex-slot is-hotbar" data-slot="4"><div class="block-preview block-preview-water"></div></div>
                    <div class="inventory-hex-slot is-hotbar" data-slot="5"><div class="block-preview block-preview-nethrock"></div></div>
                    <div class="inventory-hex-slot is-hotbar" data-slot="6"><div class="block-preview block-preview-oak-wood"></div></div>
                    <div class="inventory-hex-slot is-hotbar" data-slot="7"><div class="block-preview block-preview-oak-leaves"></div></div>
                    <div class="inventory-hex-slot is-hotbar" data-slot="8"><div class="block-preview block-preview-snow"></div></div>
                </div>
            </div>
        </div>
    </div>

    <div id="inventory">
        <div class="slot active" data-index="0">
            <div class="slot-bg"></div>
            <div class="block-preview block-preview-grass"></div>
            <div class="slot-label">1</div>
        </div>
        <div class="slot" data-index="1">
            <div class="slot-bg"></div>
            <div class="block-preview block-preview-dirt"></div>
            <div class="slot-label">2</div>
        </div>
        <div class="slot" data-index="2">
            <div class="slot-bg"></div>
            <div class="block-preview block-preview-stone"></div>
            <div class="slot-label">3</div>
        </div>
        <div class="slot" data-index="3">
            <div class="slot-bg"></div>
            <div class="block-preview block-preview-cloud"></div>
            <div class="slot-label">4</div>
        </div>
        <div class="slot" data-index="4">
            <div class="slot-bg"></div>
            <div class="block-preview block-preview-water"></div>
            <div class="slot-label">5</div>
        </div>
        <div class="slot" data-index="5">
            <div class="slot-bg"></div>
            <div class="block-preview block-preview-nethrock"></div>
            <div class="slot-label">6</div>
        </div>
        <div class="slot" data-index="6">
            <div class="slot-bg"></div>
            <div class="block-preview block-preview-oak-wood"></div>
            <div class="slot-label">7</div>
        </div>
        <div class="slot" data-index="7">
            <div class="slot-bg"></div>
            <div class="block-preview block-preview-oak-leaves"></div>
            <div class="slot-label">8</div>
        </div>
        <div class="slot" data-index="8">
            <div class="slot-bg"></div>
            <div class="block-preview block-preview-snow"></div>
            <div class="slot-label">9</div>
        </div>
    </div>
    <div id="held-item-name" aria-live="polite" aria-atomic="true"></div>

    <script type="module" src="src/main.js?v=0.1.1"></script>
</body>
</html>
