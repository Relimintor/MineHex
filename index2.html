<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HexCraft terrain</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="src/mobile/mobile.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/simplex-noise/2.4.0/simplex-noise.min.js"></script>
</head>
<body>

    <div id="mode-select">
        <div class="mode-panel">
            <h1>Select Controls</h1>
            <button data-mode="pc">PC</button>
            <button data-mode="mobile">Mobile</button>
            <button data-mode="celeron_cb">Celeron Chromebook (Ultra Low PC)</button>
            <button data-mode="console">Console</button>
            <p id="mode-status"></p>
        </div>
    </div>

    <div id="version">HexCraft v0.1.0</div>
    <div id="coordinates" aria-live="polite">Axial q:0 r:0 h:0 | Cube x:0 y:0 z:0</div>

    <div id="crosshair"></div>

    <div id="inventory">
        <div class="slot active" data-index="0">
            <div class="slot-bg"></div>
            <div class="block-preview block-preview-grass"></div>
            <div class="slot-label">1</div>
        </div>
        <div class="slot" data-index="1">
            <div class="slot-bg"></div>
            <div class="block-preview block-preview-dirt"></div>
            <div class="slot-label">2</div>
        </div>
        <div class="slot" data-index="2">
            <div class="slot-bg"></div>
            <div class="block-preview block-preview-stone"></div>
            <div class="slot-label">3</div>
        </div>
        <div class="slot" data-index="3">
            <div class="slot-bg"></div>
            <div class="block-preview block-preview-cloud"></div>
            <div class="slot-label">4</div>
        </div>
        <div class="slot" data-index="4">
            <div class="slot-bg"></div>
            <div class="block-preview block-preview-water"></div>
            <div class="slot-label">5</div>
        </div>
        <div class="slot" data-index="5">
            <div class="slot-bg"></div>
            <div class="block-preview block-preview-nethrock"></div>
            <div class="slot-label">6</div>
        </div>
        <div class="slot" data-index="6">
            <div class="slot-bg"></div>
            <div class="block-preview block-preview-oak-wood"></div>
            <div class="slot-label">7</div>
        </div>
        <div class="slot" data-index="7">
            <div class="slot-bg"></div>
            <div class="block-preview block-preview-oak-leaves"></div>
            <div class="slot-label">8</div>
        </div>
        <div class="slot" data-index="8">
            <div class="slot-bg"></div>
            <div class="block-preview block-preview-snow"></div>
            <div class="slot-label">9</div>
        </div>
    </div>

    <script type="module" src="src/main.js?v=0.1.1"></script>
</body>
</html>
