<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MineHex FPS</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <h1>MineHex FPS</h1>
      <p>
        Minecraft-style first-person sandbox on a flat world using connected hex columns.
        Click the viewport to lock pointer, move with WASD, left click to place, Shift+Left click to break.
      </p>
      <section class="toolbar">
        <label for="material">Material</label>
        <select id="material"></select>
        <button id="regen">Regenerate World</button>
      </section>
      <div id="game" aria-label="MineHex first-person world"></div>
      <p id="status" aria-live="polite"></p>
    </main>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.166.1/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.166.1/examples/jsm/"
        }
      }
    </script>
    <script src="main.js" type="module"></script>
  </body>
</html>
