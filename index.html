<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MineHex Menu</title>
    <style>
        :root {
            --bg: #0f172a;
            --panel: #111827;
            --panel-2: #1f2937;
            --text: #e5e7eb;
            --muted: #9ca3af;
            --accent: #22c55e;
            --accent-2: #16a34a;
            --danger: #ef4444;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            background: radial-gradient(circle at top, #1e293b 0%, var(--bg) 60%);
            color: var(--text);
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .app {
            width: min(720px, 100%);
            background: rgba(17, 24, 39, 0.9);
            border: 1px solid #374151;
            border-radius: 14px;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.4);
            overflow: hidden;
        }

        .screen {
            display: none;
            padding: 24px;
            gap: 14px;
        }

        .screen.active {
            display: grid;
        }

        h1,
        h2 {
            margin: 0 0 10px;
        }

        .button-row,
        .world-actions {
            display: grid;
            gap: 10px;
        }

        button {
            padding: 12px 14px;
            border: 1px solid #4b5563;
            border-radius: 10px;
            background: var(--panel-2);
            color: var(--text);
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #374151;
        }

        button.primary {
            background: var(--accent);
            border-color: var(--accent-2);
            color: #052e16;
            font-weight: bold;
        }

        .world-list {
            background: var(--panel);
            border: 1px solid #374151;
            border-radius: 10px;
            padding: 12px;
            min-height: 180px;
            display: grid;
            gap: 8px;
            align-content: start;
        }

        .world-list button {
            text-align: left;
        }

        .world-list .empty {
            color: var(--muted);
            font-style: italic;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #4b5563;
            background: #0b1220;
            color: var(--text);
            font-size: 16px;
        }

        .hint {
            color: var(--muted);
            margin: 0;
        }

        .toolbar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .status {
            min-height: 20px;
            color: #86efac;
        }
    </style>
</head>
<body>
    <main class="app">
        <section id="main-screen" class="screen active">
            <h1>MineHex</h1>
            <div class="button-row">
                <button id="go-world" class="primary">World</button>
                <button id="go-options">Options</button>
                <button id="go-credits">Credits</button>
                <button id="go-about">About</button>
            </div>
            <p class="hint">Only the World flow is functional right now.</p>
        </section>

        <section id="world-screen" class="screen">
            <h2>World</h2>
            <div class="world-actions">
                <button id="open-create" class="primary">Create World</button>
                <button id="open-load">Load World</button>
            </div>

            <h3>Worlds</h3>
            <div id="world-list" class="world-list"></div>

            <div class="toolbar">
                <button id="back-main">Back</button>
            </div>
            <div id="world-status" class="status"></div>
        </section>

        <section id="create-screen" class="screen">
            <h2>Create World</h2>
            <label for="world-name">Choose world name</label>
            <input id="world-name" type="text" placeholder="My First World" maxlength="40" />
            <div class="toolbar">
                <button id="save-world" class="primary">Save World</button>
                <button id="cancel-create">Cancel</button>
            </div>
            <div id="create-status" class="status"></div>
        </section>

        <section id="load-screen" class="screen">
            <h2>Load World</h2>
            <p class="hint">Select one of your saved worlds from the list below.</p>
            <div id="load-list" class="world-list"></div>
            <div class="toolbar">
                <button id="back-world-from-load">Back</button>
            </div>
            <div id="load-status" class="status"></div>
        </section>
    </main>

    <script>
        const STORAGE_KEY = "minehex_worlds";

        const screens = {
            main: document.getElementById("main-screen"),
            world: document.getElementById("world-screen"),
            create: document.getElementById("create-screen"),
            load: document.getElementById("load-screen")
        };

        const worldList = document.getElementById("world-list");
        const loadList = document.getElementById("load-list");
        const worldNameInput = document.getElementById("world-name");
        const worldStatus = document.getElementById("world-status");
        const createStatus = document.getElementById("create-status");
        const loadStatus = document.getElementById("load-status");

        function readWorlds() {
            const raw = localStorage.getItem(STORAGE_KEY);
            return raw ? JSON.parse(raw) : [];
        }

        function writeWorlds(worlds) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(worlds));
        }

        function showScreen(name) {
            Object.values(screens).forEach((screen) => screen.classList.remove("active"));
            screens[name].classList.add("active");
        }

        function worldButton(name, onClick) {
            const btn = document.createElement("button");
            btn.textContent = name;
            btn.addEventListener("click", () => onClick(name));
            return btn;
        }

        function renderWorldLists() {
            const worlds = readWorlds();
            worldList.innerHTML = "";
            loadList.innerHTML = "";

            if (!worlds.length) {
                const empty = document.createElement("div");
                empty.className = "empty";
                empty.textContent = "No worlds saved yet.";
                worldList.append(empty.cloneNode(true));
                loadList.append(empty);
                return;
            }

            worlds.forEach((world) => {
                worldList.append(worldButton(world.name, () => {
                    worldStatus.textContent = `Selected world: ${world.name}`;
                }));

                loadList.append(worldButton(world.name, (name) => {
                    loadStatus.textContent = `Loaded world: ${name}`;
                }));
            });
        }

        document.getElementById("go-world").addEventListener("click", () => {
            showScreen("world");
            renderWorldLists();
        });

        document.getElementById("go-options").addEventListener("click", () => {
            worldStatus.textContent = "Options screen will be added later.";
        });

        document.getElementById("go-credits").addEventListener("click", () => {
            worldStatus.textContent = "Credits screen will be added later.";
        });

        document.getElementById("go-about").addEventListener("click", () => {
            worldStatus.textContent = "About screen will be added later.";
        });

        document.getElementById("open-create").addEventListener("click", () => {
            createStatus.textContent = "";
            worldNameInput.value = "";
            showScreen("create");
            worldNameInput.focus();
        });

        document.getElementById("open-load").addEventListener("click", () => {
            loadStatus.textContent = "";
            showScreen("load");
            renderWorldLists();
        });

        document.getElementById("save-world").addEventListener("click", () => {
            const name = worldNameInput.value.trim();
            if (!name) {
                createStatus.textContent = "Please enter a world name.";
                return;
            }

            const worlds = readWorlds();
            if (worlds.some((world) => world.name.toLowerCase() === name.toLowerCase())) {
                createStatus.textContent = "A world with that name already exists.";
                return;
            }

            worlds.push({ name, createdAt: new Date().toISOString() });
            writeWorlds(worlds);
            createStatus.textContent = `Saved world: ${name}`;
            renderWorldLists();
        });

        document.getElementById("cancel-create").addEventListener("click", () => {
            showScreen("world");
            renderWorldLists();
        });

        document.getElementById("back-main").addEventListener("click", () => showScreen("main"));
        document.getElementById("back-world-from-load").addEventListener("click", () => {
            showScreen("world");
            renderWorldLists();
        });

        renderWorldLists();
    </script>
</body>
</html>
